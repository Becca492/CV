<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mon profil — POSTEJOB</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="stylesheet" href="assets/CSS/style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap"
      rel="stylesheet"
    />
    <style>
      .profil-wrap {
        max-width: 700px;
        margin: 0 auto;
        padding: 2.5rem 2rem 5rem;
      }
      .profil-header {
        display: flex;
        align-items: center;
        gap: 1.5rem;
        background: var(--bg2);
        border: 1px solid var(--line);
        border-radius: var(--r);
        padding: 2rem;
        margin-bottom: 1rem;
        position: relative;
        overflow: hidden;
      }
      .profil-header::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(90deg, var(--jade), var(--amber));
      }
      .profil-avatar {
        width: 72px;
        height: 72px;
        border-radius: 50%;
        background: var(--amber-soft);
        border: 2px solid rgba(212, 168, 67, 0.3);
        display: grid;
        place-items: center;
        font-family: "Fraunces", serif;
        font-size: 26px;
        color: var(--amber);
        flex-shrink: 0;
      }
      .profil-header-info {
        flex: 1;
      }
      .profil-name {
        font-family: "Fraunces", serif;
        font-size: 26px;
        color: var(--text);
        margin-bottom: 4px;
        letter-spacing: -0.01em;
      }
      .profil-poste {
        font-size: 13px;
        color: var(--text2);
        margin-bottom: 10px;
      }
      .profil-badges {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 4px 12px;
        border-radius: 30px;
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.03em;
      }
      .badge-level {
        background: var(--amber-soft);
        border: 1px solid rgba(212, 168, 67, 0.25);
        color: var(--amber);
      }
      .badge-ville {
        background: var(--bg3);
        border: 1px solid var(--line);
        color: var(--text2);
      }
      .badge-tel {
        background: var(--bg3);
        border: 1px solid var(--line);
        color: var(--text2);
      }

      .pcard {
        background: var(--bg2);
        border: 1px solid var(--line);
        border-radius: var(--r);
        padding: 1.5rem;
        margin-bottom: 1rem;
      }
      .pcard-title {
        font-size: 10px;
        font-weight: 500;
        color: var(--text3);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 1rem;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .pcard-title::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--line);
      }
      .pcard-bio {
        font-size: 14px;
        color: var(--text2);
        line-height: 1.75;
      }

      .info-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .info-item label {
        display: block;
        font-size: 10px;
        color: var(--text3);
        text-transform: uppercase;
        letter-spacing: 0.07em;
        margin-bottom: 4px;
      }
      .info-item span {
        font-size: 14px;
        color: var(--text);
      }
      .info-item span.empty {
        color: var(--text3);
        font-style: italic;
      }

      .exp-visual {
        display: flex;
        align-items: center;
        gap: 1.5rem;
        margin-bottom: 1rem;
      }
      .exp-num-big {
        font-family: "Fraunces", serif;
        font-size: 52px;
        color: var(--amber);
        line-height: 1;
        flex-shrink: 0;
      }
      .exp-bar-wrap {
        flex: 1;
      }
      .exp-bar-label {
        font-size: 11px;
        color: var(--text3);
        margin-bottom: 6px;
      }
      .exp-bar-track {
        height: 6px;
        background: var(--bg4);
        border-radius: 3px;
        overflow: hidden;
      }
      .exp-bar-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--jade), var(--amber));
        border-radius: 3px;
        transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
      }
      .exp-level-badge {
        display: inline-flex;
        padding: 4px 14px;
        border-radius: 30px;
        font-size: 12px;
        font-weight: 500;
      }

      .chips-list {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
      }
      .chip-ro {
        display: inline-flex;
        align-items: center;
        padding: 5px 13px;
        background: rgba(212, 168, 67, 0.08);
        border: 1px solid rgba(212, 168, 67, 0.2);
        border-radius: 30px;
        font-size: 12px;
        color: var(--amber);
      }
      .chip-empty {
        font-size: 13px;
        color: var(--text3);
        font-style: italic;
      }

      .dl-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .dl-card {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 13px 15px;
        background: var(--bg3);
        border: 1px solid var(--line);
        border-radius: var(--r-sm);
        cursor: pointer;
        transition: 0.2s;
      }
      .dl-card:hover {
        border-color: var(--amber);
        background: rgba(212, 168, 67, 0.04);
      }
      .dl-ico {
        width: 34px;
        height: 34px;
        border-radius: 8px;
        background: var(--bg4);
        border: 1px solid var(--line);
        display: grid;
        place-items: center;
        flex-shrink: 0;
      }
      .dl-info {
        flex: 1;
      }
      .dl-name {
        font-size: 13px;
        font-weight: 500;
        color: var(--text);
      }
      .dl-file {
        font-size: 11px;
        color: var(--text3);
        margin-top: 1px;
      }
      .dl-arr {
        font-size: 15px;
        color: var(--amber);
        opacity: 0.7;
      }

      .profil-actions {
        display: flex;
        justify-content: center;
        margin-top: 2rem;
      }

      /* État chargement */
      .loading-profil {
        text-align: center;
        padding: 4rem 2rem;
        color: var(--text3);
        font-size: 14px;
      }
      .loading-spinner {
        width: 32px;
        height: 32px;
        border: 2px solid var(--line);
        border-top-color: var(--amber);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 1rem;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* Pas de profil */
      .no-profil {
        text-align: center;
        padding: 4rem 2rem;
        max-width: 400px;
        margin: 0 auto;
      }
      .no-profil-ico {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        background: var(--bg2);
        border: 1px solid var(--line);
        display: grid;
        place-items: center;
        margin: 0 auto 1.5rem;
      }
      .no-profil h2 {
        font-family: "Fraunces", serif;
        font-size: 22px;
        color: var(--text);
        margin-bottom: 8px;
      }
      .no-profil p {
        font-size: 13px;
        color: var(--text2);
        line-height: 1.7;
        margin-bottom: 1.5rem;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <nav class="navbar">
        <div
          class="logo"
          onclick="window.location.href = 'index.html'"
          style="cursor: pointer"
        >
          <div class="logo-icon"></div>
          <span class="logo-text">POSTE <b>JOB</b></span>
        </div>
        <div class="nav-r">
          <div class="uinfo" id="uinfo" style="display: flex">
            <div class="uav" id="uav">KD</div>
            <span class="unm" id="unm">Candidat</span>
          </div>
          <button class="btn-xs" onclick="logout()">Déconnexion</button>
        </div>
      </nav>

      <div class="profil-wrap">
        <button
          class="btn-back-top"
          onclick="window.location.href = 'index.html'"
        >
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path
              d="M9 2L4 7l5 5"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          Retour à l'accueil
        </button>
        <h1
          style="
            font-family: &quot;Fraunces&quot;, serif;
            font-size: 30px;
            color: var(--text);
            margin-bottom: 4px;
            letter-spacing: -0.015em;
          "
        >
          Mon profil
        </h1>
        <p style="font-size: 13px; color: var(--text2); margin-bottom: 2rem">
          Votre profil visible par les recruteurs
        </p>

        <!-- Contenu dynamique -->
        <div id="profil-content">
          <div class="loading-profil">
            <div class="loading-spinner"></div>
            Chargement de votre profil...
          </div>
        </div>
      </div>
    </div>

    <div class="toast" id="toast">
      <div class="toast-dot"></div>
      <span id="toast-msg"></span>
    </div>
    <script src="assets/JS/style.js"></script>
    <script src="assets/JS/candidat.js"></script>
  </body>
</html>
